# Build and deploy the Witness Live (Python ADK) service to Cloud Run.
# Run from repo root: gcloud builds submit --config=cloudbuild-live.yaml .
# Set GOOGLE_GENAI_API_KEY (and optionally Vertex env vars) on the Cloud Run service.
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/witness-live"
      - "-f"
      - "live/Dockerfile"
      - "live"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/witness-live"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "witness-live"
      - "--image"
      - "gcr.io/$PROJECT_ID/witness-live"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8081"
      - "--max-instances"
      - "2"

images:
  - "gcr.io/$PROJECT_ID/witness-live"
